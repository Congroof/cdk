[program:cdk-server]
command=/opt/cdk-server/backend/cdk-server
directory=/opt/cdk-server/backend
environment=DATABASE_URL="%(ENV_DATABASE_URL)s",JWT_SECRET="%(ENV_JWT_SECRET)s",SERVER_ADDR="0.0.0.0:3000",SKINFORGE_HASH_SYNC_ENABLED="%(ENV_SKINFORGE_HASH_SYNC_ENABLED)s",SKINFORGE_HASH_MIRROR_DIR="%(ENV_SKINFORGE_HASH_MIRROR_DIR)s",SKINFORGE_HASH_PUBLIC_BASE_URL="%(ENV_SKINFORGE_HASH_PUBLIC_BASE_URL)s",SKINFORGE_HASH_SYNC_INTERVAL_HOURS="%(ENV_SKINFORGE_HASH_SYNC_INTERVAL_HOURS)s"
autostart=true
autorestart=true
startretries=10
startsecs=3
redirect_stderr=true
stdout_logfile=/var/log/cdk-server.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
