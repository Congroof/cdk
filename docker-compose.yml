services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: cdk-mysql-root-2026
      MYSQL_DATABASE: cdk_server
      MYSQL_USER: cdk
      MYSQL_PASSWORD: cdk-db-password-2026
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  cdk-server:
    build: .
    ports:
      - "80:80"
    volumes:
      - ./skinforge-updates:/opt/skinforge-updates
    environment:
      - DATABASE_URL=mysql://cdk:cdk-db-password-2026@mysql:3306/cdk_server
      - JWT_SECRET=cdk-server-jwt-secret-key-2026
      - KDOCS_CREDENTIAL_KEY=${KDOCS_CREDENTIAL_KEY:?set KDOCS_CREDENTIAL_KEY to Base64 of 32 bytes}
      - SERVER_ADDR=0.0.0.0:3000
      - SKINFORGE_HASH_SYNC_ENABLED=true
      - SKINFORGE_HASH_MIRROR_DIR=/opt/skinforge-updates/hashes
      - SKINFORGE_HASH_SYNC_INTERVAL_HOURS=24
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

volumes:
  mysql_data:
